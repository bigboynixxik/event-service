services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-service
    ports:
      - "8080:8080"
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./internal/config/.env
    restart: unless-stopped
    networks:
      - eventify_network

  db:
    image: postgres:17.0-alpine
    container_name: eventify-db
    env_file:
      - ./internal/config/.env
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d$$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eventify_network


volumes:
  postgres_data:

networks:
  eventify_network:
    driver: bridge